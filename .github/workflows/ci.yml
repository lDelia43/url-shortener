name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the integration test (concurrency against a live DB).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: url_user
          POSTGRES_PASSWORD: url_pass
          POSTGRES_DB: url_shortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U url_user -d url_shortener"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://url_user:url_pass@localhost:5432/url_shortener?schema=public
      BASE_URL: http://localhost:3000
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests
        run: npm run test:e2e
